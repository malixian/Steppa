<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Steppa · 项目推荐</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <aside class="sidebar" aria-label="Steppa navigation">
        <nav class="nav-list">
          <a class="nav-item active" href="recommendation.html"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 3v3"/><path d="M18.4 5.6 16.2 7.8"/><path d="M21 12h-3"/><path d="m7.8 7.8-2.2-2.2"/><path d="M6 12H3"/><path d="m8 21 4-9 4 9"/><path d="M9.5 17h5"/></svg></span>项目推荐</a>
          <a class="nav-item" href="overview.html"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 12a8 8 0 1 0 8-8"/><path d="M12 4v8h8"/></svg></span>进度总览</a>
          <a class="nav-item" href="progress.html"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 19V5"/><path d="M8 17v-6M13 17V7M18 17v-3"/></svg></span>项目进度</a>
          <a class="nav-item" href="programs.html"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M5 4h14v16H5z"/><path d="M9 8h6M9 12h6M9 16h3"/></svg></span>训练汇总</a>
          <a class="nav-item" href="index.html"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm-7 8a7 7 0 0 1 14 0"/></svg></span>我的</a>
        </nav>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">项目推荐</p>
            <h1>上传 VB-MAPP 截图生成推荐</h1>
          </div>
        </header>

        <section class="panel recommendation-config">
          <div class="panel-header">
            <div>
              <p class="section-kicker">截图上传</p>
              <h2>生成 5 个推荐项目</h2>
            </div>
          </div>

          <form class="ai-form" id="aiRecommendationForm">
            <label class="file-picker">
              VB-MAPP 截图
              <input id="vbmappImageInput" type="file" accept="image/*" />
            </label>
            <button class="primary-action" type="submit" id="runRecommendationButton">生成推荐</button>
          </form>
          <p class="empty-note">模型配置在“我的”中保存。每次固定展示 5 个匹配项目。</p>
        </section>

        <section class="panel">
          <div class="panel-header">
            <div>
              <p class="section-kicker">推荐结果</p>
              <h2 id="aiRecommendationStatus">等待上传截图</h2>
            </div>
          </div>
          <div class="request-status" id="aiRequestStatus" hidden>
            <div class="request-spinner" aria-hidden="true"></div>
            <div>
              <strong id="aiRequestPhase">尚未开始</strong>
              <p id="aiRequestTimer">已等待 0 秒</p>
            </div>
          </div>
          <div class="recommendation-results" id="aiRecommendationResults"></div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <div>
              <p class="section-kicker">推荐历史</p>
              <h2>最近记录</h2>
            </div>
          </div>
          <div class="recommendation-history" id="aiRecommendationHistory"></div>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
